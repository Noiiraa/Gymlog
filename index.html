  body{background:#0a0a0f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;max-width:480px;margin:0 auto;padding-bottom:90px;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  .header{padding:20px 16px 14px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:12px;}
  .logo{width:38px;height:38px;background:linear-gradient(135deg,#f97316,#ec4899);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .header-title{font-weight:700;font-size:18px;letter-spacing:-0.5px;}
  .header-sub{font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;}
  .sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f87171;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .tabs{display:flex;gap:3px;padding:10px 12px;background:#0a0a0f;position:sticky;top:0;z-index:10;border-bottom:1px solid #1e1e2e;}
  .tab{flex:1;padding:8px 2px;border-radius:8px;border:none;font-size:11px;font-weight:600;background:#1a1a2e;color:#64748b;transition:all .15s;}
  .tab.active{background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;}
  .page{display:none;padding:16px;}
  .page.active{display:block;}
  .label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
  .section{margin-bottom:18px;}
  .input{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%;}
  .input:focus{outline:none;border-color:#f97316;}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap;}
  .btn-pill{padding:8px 14px;border-radius:8px;border:2px solid #2d2d4e;background:#1a1a2e;color:#94a3b8;font-weight:600;font-size:13px;transition:all .15s;}
  .btn-save{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:700;transition:all .2s;margin-top:4px;}
  .btn-save:disabled{background:#1a1a2e;color:#374151;cursor:not-allowed;}
  .btn-save.ready{background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;}
  .btn-save.done{background:#22c55e;color:#fff;}
  .btn-save.saving{background:#f97316;color:#fff;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .entry-card{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1a1a2e;border-radius:8px;margin-bottom:5px;border-left:3px solid #64748b;}
  .entry-title{font-size:13px;font-weight:600;}
  .entry-sub{font-size:11px;color:#64748b;}
  .del-btn{background:none;border:none;color:#475569;font-size:18px;padding:0 4px;line-height:1;}
  .card{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:16px;}
  .card-title{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:#0a0a0f;border-radius:6px;padding:5px 10px;font-size:12px;margin:3px;}
  .chip-del{background:none;border:none;color:#475569;cursor:pointer;font-size:13px;padding:0;line-height:1;}
  .add-row{display:flex;gap:8px;margin-top:8px;}
  .btn-add{padding:10px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;font-weight:700;white-space:nowrap;font-size:13px;}
  .bar-row{margin-bottom:10px;}
  .bar-labels{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px;}
  .bar-track{height:7px;background:#0a0a0f;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s;}
  .chart-wrap{position:relative;background:#0a0a0f;border-radius:10px;padding:12px 8px 8px;margin-bottom:8px;}
  .chart-stat{text-align:center;margin-top:8px;font-size:13px;font-weight:700;}
  .empty-msg{background:#0a0a0f;border-radius:10px;padding:24px;text-align:center;color:#64748b;font-size:13px;}
  .export-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:8px;border:1px solid #2d2d4e;background:#1a1a2e;color:#94a3b8;font-size:13px;font-weight:600;margin-top:8px;}
  .export-btn:hover{border-color:#f97316;color:#f97316;}
  .danger-btn{width:100%;padding:12px;border-radius:10px;border:1px solid #7f1d1d;background:transparent;color:#f87171;font-weight:600;font-size:13px;}
  .session-entries{margin-top:16px;}
  .session-title{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .ejercicio-list{display:flex;flex-direction:column;gap:5px;}
  .ej-btn{padding:10px 14px;border-radius:8px;border:2px solid #2d2d4e;background:#1a1a2e;color:#94a3b8;font-size:13px;text-align:left;transition:all .15s;}
  .persona-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .persona-btn{flex:1;min-width:80px;padding:10px 8px;border-radius:10px;border:2px solid #2d2d4e;background:#1a1a2e;font-weight:700;font-size:14px;}
  .no-data{padding:40px 20px;text-align:center;color:#475569;font-size:14px;}
  .loading{padding:40px 20px;text-align:center;color:#64748b;font-size:14px;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
  /* Config screen */
  .config-screen{position:fixed;inset:0;background:#0a0a0f;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;}
  .config-screen h2{font-size:22px;font-weight:800;background:linear-gradient(135deg,#f97316,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .config-screen p{color:#64748b;font-size:13px;text-align:center;line-height:1.6;}
  .config-screen .input{margin-bottom:0;}
  .config-label{font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:4px;}
  .config-group{width:100%;max-width:360px;}
  .btn-primary{width:100%;max-width:360px;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;font-size:16px;font-weight:700;}

    </div>
    <button class="btn-save" id="btn-save" onclick="saveEntry()" disabled>Guardar serie</button>
    <div class="session-entries" id="session-entries" style="display:none">
      <div class="session-title" id="session-count"></div>
      <div id="session-list"></div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="page-historial" class="page">
    <div id="historial-list"><div class="loading">Cargando...</div></div>
  </div>

  <!-- PROGRESO -->
  <div id="page-progreso" class="page">
    <div class="card">
      <div class="card-title">Volumen por grupo muscular</div>
      <div id="volumen-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">Evolución de peso</div>
      <div class="btn-row" id="chart-persona-btns" style="margin-bottom:10px;"></div>
      <select id="chart-ejercicio" class="input" style="margin-bottom:12px;" onchange="renderChart()"></select>
      <div id="chart-container">
        <div class="chart-wrap"><canvas id="myChart" height="200"></canvas></div>
        <div class="chart-stat" id="chart-stat"></div>
        <button class="export-btn" onclick="exportChart()">📷 Guardar gráfico como imagen</button>
      </div>
      <div id="chart-empty" class="empty-msg" style="display:none">Necesitas al menos 2 sesiones con este ejercicio</div>
    </div>
  </div>

  <!-- AJUSTES -->

    <div class="card">
      <div class="card-title">👤 Personas</div>
      <div id="personas-chips"></div>
      <div class="add-row">

      </div>
    </div>
    <div class="card">
      <div class="card-title">🏋️ Grupos musculares</div>
      <div id="grupos-chips"></div>
      <div class="add-row">
        <input id="new-grupo" class="input" placeholder="Nuevo grupo..." onkeydown="if(event.key==='Enter')addGrupo()"/>
        <button class="btn-add" onclick="addGrupo()">+ Añadir</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🔧 Ejercicios por grupo</div>
      <select id="sel-grupo-ej" class="input" style="margin-bottom:10px;" onchange="renderEjerciciosAdmin()"></select>
      <div id="ejercicios-admin-chips"></div>
      <div class="add-row">
        <input id="new-ejercicio" class="input" placeholder="Nombre del ejercicio..." onkeydown="if(event.key==='Enter')addEjercicio()"/>
        <button class="btn-add" onclick="addEjercicio()">+ Añadir</button>
      </div>
    </div>
     <div class="card">
       <div class="card-title">🔌 Conexión</div>
       <div style="font-size:12px;color:#64748b;margin-bottom:10px;" id="conn-info"></div>
       <button class="export-btn" onclick="logout()" style="margin-bottom:8px;">🚪 Cerrar sesión</button>
     </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── CREDENTIALS ───
async function initSupabase() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginScreen = document.getElementById('login-screen');
    const app = document.getElementById('app');

    if (loginScreen) loginScreen.style.display = 'none';
    if (app) app.style.display = 'none';

    const { data, error } = await sbClient.auth.getSession();
    if (error) throw error;

    if (data.session) {
      await startApp();
    } else {
      loginScreen.style.display = 'flex';
    }

    sbClient.auth.onAuthStateChange((_event, session) => {
      if (session) {
        startApp();
      } else {
        sessions = [];
        sessionEntries = [];
        app.style.display = 'none';
        loginScreen.style.display = 'flex';
      }
    });

  } catch(e) {
    alert('Error inicializando Supabase: ' + e.message);
    console.error(e);
  }
}

async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  loadConfig();
  await loadSessions();

  const { data } = await sbClient.auth.getUser();
  const email = data?.user?.email || 'usuario';

  const conn = document.getElementById('conn-info');
  if (conn) conn.textContent = `Sesión iniciada como: ${email}`;
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    alert('Introduce email y contraseña');
    return;
  }

  try {
    const { error } = await sbClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) throw error;

    document.getElementById('login-password').value = '';
    showToast('Sesión iniciada');
  } catch (e) {
    alert('No se pudo iniciar sesión: ' + e.message);
    console.error(e);
  }
}

async function logout() {
  try {
    const { error } = await sbClient.auth.signOut();
    if (error) throw error;

    sessions = [];
    sessionEntries = [];
    showToast('Sesión cerrada');

    alert('Error cerrando sesión: ' + e.message);
    console.error(e);
  }
}

// ─── CONFIG (localStorage) ───
function loadConfig() {
  try { const r = localStorage.getItem(CONFIG_KEY); config = r ? JSON.parse(r) : null; } catch {}
  if (!config) { config = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); saveConfigLocal(); }
  chartPersona = config.personas[0] || "María";
  initRegistro();
  document.getElementById('reg-peso').addEventListener('input', updateSaveBtn);
}
function saveConfigLocal() { localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); }

// ─── SUPABASE SESSIONS ───
function setSyncing(state) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
}

async function loadSessions() {
  setSyncing('syncing');
  try {
    const { data, error } = await sbClient.from('sesiones').select('*').order('fecha', {ascending:true}).order('id', {ascending:true});
    if (error) throw error;
    sessions = data || [];
    // Import historical if DB is empty
    // Import histórico desactivado en producción.
    // Si necesitas importar datos antiguos, hazlo una sola vez desde Supabase SQL o desde un script controlado.
    setSyncing('ok');
    updateHeaderStats();
  } catch(e) {
    setSyncing('error'); showToast('Error cargando datos'); console.error(e);
  }
}

async function importHistorical() {
  setSyncing('syncing');
  try {
    const rows = HISTORICAL.map(h => ({fecha:h.fecha, persona:h.persona, grupo:h.grupo, ejercicio:h.ejercicio, series:h.series, reps:h.reps, peso:h.peso}));
    const { error } = await sbClient.from('sesiones').insert(rows);
    if (error) throw error;
    showToast('✅ Datos históricos importados');
    await loadSessions();
  } catch(e) {
    setSyncing('error'); showToast('Error importando histórico'); console.error(e);
  }
}

async function insertEntry(entry) {
  const { data, error } = await sbClient.from('sesiones').insert([{
    fecha: entry.fecha, persona: entry.persona, grupo: entry.grupo,
    ejercicio: entry.ejercicio, series: entry.series, reps: entry.reps, peso: entry.peso
  }]).select().single();
  if (error) throw error;
  return data;
}

async function deleteEntryDB(id) {
  const { error } = await sbClient.from('sesiones').delete().eq('id', id);
  if (error) throw error;
}

// ─── HELPERS ───
function personaColor(p) {
  const i = config.personas.indexOf(p);
  return i >= 0 ? PERSONA_COLORS[i % PERSONA_COLORS.length] : "#94a3b8";
}
function groupColor(g) { return GROUP_COLORS[g] || "#94a3b8"; }

function showToast(msg, duration=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updateHeaderStats() {
  const days = new Set(sessions.map(s => s.fecha)).size;
  document.getElementById('header-stats').textContent = `${days} sesiones · ${sessions.length} entradas`;
}

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

// ─── TABS ───
function showTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['registro','historial','progreso','ajustes'][i] === t);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if (t==='historial') renderHistorial();
  if (t==='progreso') renderProgreso();
  if (t==='ajustes') renderAjustes();
}

// ─── REGISTRO ───
function initRegistro() {
  document.getElementById('reg-fecha').value = new Date().toISOString().split('T')[0];
  renderPersonaBtns();
  renderGrupoBtns();
}

function renderPersonaBtns() {
  document.getElementById('persona-btns').innerHTML = config.personas.map(p => {
    const c = personaColor(p), sel = selectedPersona===p;
    return `<button class="persona-btn" onclick='selectPersona(${JSON.stringify(p)})'
      style="border-color:${sel?c:'#2d2d4e'};background:${sel?c+'22':'#1a1a2e'};color:${sel?c:'#94a3b8'}">${p}</button>`;
  }).join('');
}

function selectPersona(p) { selectedPersona=p; renderPersonaBtns(); updateSaveBtn(); }

function renderGrupoBtns() {
  document.getElementById('grupo-btns').innerHTML = Object.keys(config.ejercicios).map(g => {
    const c=groupColor(g), sel=selectedGrupo===g;
    return `<button class="btn-pill" onclick='selectGrupo(${JSON.stringify(g)})'
      style="border-color:${sel?c:'#2d2d4e'};background:${sel?c+'22':'#1a1a2e'};color:${sel?c:'#94a3b8'}">${g}</button>`;
  }).join('');
}

function selectGrupo(g) {
  selectedGrupo=g; selectedEjercicio="";
  renderGrupoBtns(); renderEjercicioBtns(); updateSaveBtn();
}

function renderEjercicioBtns() {
  const sec = document.getElementById('ejercicio-section');
  if (!selectedGrupo) { sec.style.display='none'; return; }
  sec.style.display='block';
  const ejs = config.ejercicios[selectedGrupo]||[];
  const c = groupColor(selectedGrupo);
  document.getElementById('ejercicio-list').innerHTML =
    ejs.map(e => {
      const sel = selectedEjercicio===e;
      return `<button class="ej-btn" onclick="selectEjercicio('${e.replace(/'/g,"\\'")}', false)"
        style="border-color:${sel?c:'#2d2d4e'};background:${sel?c+'22':'#1a1a2e'};color:${sel?c:'#94a3b8'};font-weight:${sel?700:400}">${e}</button>`;
    }).join('') +
    `<input class="input" id="custom-ej-input" placeholder="✏️ Otro ejercicio..."
      value="${selectedEjercicio&&!ejs.includes(selectedEjercicio)?selectedEjercicio:''}"
      oninput="selectEjercicio(this.value,true)"
      style="border-style:dashed;border-color:${selectedEjercicio&&!ejs.includes(selectedEjercicio)?'#f97316':'#2d2d4e'}"/>`;
}

function selectEjercicio(e, custom) {
  selectedEjercicio=e;
  if(!custom) renderEjercicioBtns();
  updateSaveBtn();
}

function updateSaveBtn() {
  const btn = document.getElementById('btn-save');
  const peso = document.getElementById('reg-peso').value;
  const ok = selectedPersona && selectedEjercicio && peso;
  btn.disabled = !ok;
  btn.className = 'btn-save'+(ok?' ready':'');
}

async function saveEntry() {
  const peso = parseFloat(document.getElementById('reg-peso').value);
  if (!selectedPersona||!selectedEjercicio||!peso) return;
  const entry = {
    fecha: document.getElementById('reg-fecha').value,
    persona: selectedPersona, grupo: selectedGrupo||'Otros',
    ejercicio: selectedEjercicio,
    series: parseInt(document.getElementById('reg-series').value),
    reps: parseInt(document.getElementById('reg-reps').value),
    peso
  };
  const btn = document.getElementById('btn-save');
  btn.textContent='Guardando...'; btn.className='btn-save saving'; btn.disabled=true;
  try {
    const saved = await insertEntry(entry);
    sessions.push(saved);
    sessionEntries.push(saved);
    document.getElementById('reg-peso').value='';
    updateHeaderStats();
    renderSessionEntries();
    btn.textContent='✓ Guardado'; btn.className='btn-save done';
    setTimeout(()=>{ btn.textContent='Guardar serie'; updateSaveBtn(); },1400);
  } catch(e) {
    btn.textContent='Error — reintentar'; btn.className='btn-save ready'; btn.disabled=false;
    showToast('Error guardando. Comprueba la conexión.'); console.error(e);
  }
}

function renderSessionEntries() {
  if (!sessionEntries.length) { document.getElementById('session-entries').style.display='none'; return; }
  document.getElementById('session-entries').style.display='block';
  document.getElementById('session-count').textContent=`Esta sesión (${sessionEntries.length})`;
  document.getElementById('session-list').innerHTML = sessionEntries.map(e =>
    `<div class="entry-card" style="border-left-color:${groupColor(e.grupo)}">
      <div><div class="entry-title">${esc(e.ejercicio)}</div>
      <div class="entry-sub">${esc(e.persona)} · ${esc(e.series)}×${esc(e.reps)} · ${esc(e.peso)}kg</div></div>
    </div>`).join('');
}

// ─── HISTORIAL ───
function renderHistorial() {
  const el = document.getElementById('historial-list');
  const list = [...sessions].reverse().slice(0,100);
  if (!list.length) { el.innerHTML='<div class="no-data">Sin entradas todavía</div>'; return; }
  el.innerHTML = list.map(s => {
    const pc=personaColor(s.persona);
    return `<div class="entry-card" style="border-left-color:${groupColor(s.grupo)}">
      <div>
        <div class="entry-title">${esc(s.ejercicio || '—')}</div>
        <div class="entry-sub">${esc(s.fecha)} · <span style="color:${pc}">${esc(s.persona)}</span> · ${esc(s.series)}×${esc(s.reps)} · ${esc(s.peso)}kg</div>
      </div>
      <button class="del-btn" onclick="deleteEntry(${s.id})">×</button>
    </div>`;
  }).join('');
}

async function deleteEntry(id) {
  if (!confirm('¿Borrar esta entrada?')) return;
  try {
    await deleteEntryDB(id);
    sessions = sessions.filter(s=>s.id!==id);
    updateHeaderStats(); renderHistorial();
  } catch(e) { showToast('Error borrando'); }
}

// ─── PROGRESO ───
function renderProgreso() {
  renderVolumen();
  renderChartPersonaBtns();
  renderChartEjercicioSelect();
  renderChart();
}

function renderVolumen() {
  const map={};
  sessions.forEach(s=>{ if(s.grupo) map[s.grupo]=(map[s.grupo]||0)+1; });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  document.getElementById('volumen-bars').innerHTML = sorted.map(([g,c])=>
    `<div class="bar-row">
      <div class="bar-labels"><span>${esc(g)}</span><span style="color:#64748b">${esc(c)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c/max)*100}%;background:${groupColor(g)}"></div></div>
    </div>`).join('');
}

function renderChartPersonaBtns() {
  document.getElementById('chart-persona-btns').innerHTML = config.personas.map(p => {
    const c=personaColor(p), sel=chartPersona===p;
    return `<button class="btn-pill" onclick='selectChartPersona(${JSON.stringify(p)})'
      style="border-color:${sel?c:'#2d2d4e'};background:${sel?c+'22':'#1a1a2e'};color:${sel?c:'#64748b'};font-weight:${sel?700:400}">${p}</button>`;
  }).join('');
}

function selectChartPersona(p) { chartPersona=p; renderChartPersonaBtns(); renderChart(); }

function renderChartEjercicioSelect() {
  const all=[...new Set(sessions.map(s=>s.ejercicio).filter(Boolean))].sort();
  const sel=document.getElementById('chart-ejercicio'), cur=sel.value;
  sel.innerHTML = all.map(e =>
   `<option value="${esc(e)}"${e===cur?' selected':''}>${esc(e)}</option>`
 ).join('');
}

function renderChart() {
  const ejercicio=document.getElementById('chart-ejercicio').value;
  const data=sessions
    .filter(s=>s.persona===chartPersona&&s.ejercicio===ejercicio)
    .reduce((acc,s)=>{
      const ex=acc.find(a=>a.fecha===s.fecha);
      if(ex) ex.peso=Math.max(ex.peso,s.peso); else acc.push({fecha:s.fecha,peso:s.peso});
      return acc;
    },[]).sort((a,b)=>a.fecha.localeCompare(b.fecha));

  const cont=document.getElementById('chart-container'), emp=document.getElementById('chart-empty');
  if(data.length<2){ cont.style.display='none'; emp.style.display='block'; return; }
  cont.style.display='block'; emp.style.display='none';

  const color=personaColor(chartPersona);
  if(myChart) myChart.destroy();
  myChart=new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'line',
    data:{labels:data.map(d=>d.fecha.slice(5)),datasets:[{
      label:ejercicio, data:data.map(d=>d.peso),
      borderColor:color, backgroundColor:color+'22',
      pointBackgroundColor:color, pointRadius:5, pointHoverRadius:7,
      borderWidth:2.5, fill:true, tension:0.3
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a0a0f',borderColor:'#2d2d4e',borderWidth:1,callbacks:{label:c=>`${c.parsed.y} kg`}}},
      scales:{
        x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e1e2e'}},
        y:{ticks:{color:'#64748b',font:{size:10},callback:v=>v+'kg'},grid:{color:'#1e1e2e'}}
      }
    }
  });

  const diff=data.at(-1).peso-data[0].peso, pct=((diff/data[0].peso)*100).toFixed(1);
  const statEl=document.getElementById('chart-stat');
  statEl.style.color=diff>=0?'#22c55e':'#f87171';
  statEl.textContent=`${diff>=0?'↑':'↓'} ${Math.abs(diff).toFixed(1)} kg (${diff>=0?'+':''}${pct}%) desde inicio`;
}

function exportChart() {
  if(!myChart) return;
  const ejercicio=document.getElementById('chart-ejercicio').value;
  const a=document.createElement('a');
  a.download=`gymlog_${chartPersona}_${ejercicio.replace(/\s+/g,'_')}.png`;
  a.href=myChart.toBase64Image('image/png',1); a.click();
}

// ─── AJUSTES ───
function renderAjustes() {
  renderPersonasChips(); renderGruposChips(); renderSelGrupoEj(); renderEjerciciosAdmin();
}

function renderPersonasChips() {
  document.getElementById('personas-chips').innerHTML = config.personas.map(p=>{
    const c=personaColor(p);
    return `<span class="chip" style="border:1px solid ${c}44">
      <span style="color:${c};font-weight:700">${esc(p)}</span>
      <button class="chip-del" onclick='removePersona(${JSON.stringify(p)})'>×</button></span>`;
  }).join('');
}
function addPersona() {
  const v=document.getElementById('new-persona').value.trim();
  if(!v||config.personas.includes(v)) return;
  config.personas.push(v); saveConfigLocal();
  document.getElementById('new-persona').value='';
  renderAjustes(); renderPersonaBtns();
}
function removePersona(p) {
  if(config.personas.length<=1) return;
  config.personas=config.personas.filter(x=>x!==p); saveConfigLocal();
  renderAjustes(); renderPersonaBtns();
}

function renderGruposChips() {
  document.getElementById('grupos-chips').innerHTML = Object.keys(config.ejercicios).map(g=>
    `<span class="chip" style="background:${groupColor(g)}22;color:${groupColor(g)}">${g}</span>`
  ).join('');
}
function addGrupo() {
  const v=document.getElementById('new-grupo').value.trim();
  if(!v||config.ejercicios[v]) return;
  config.ejercicios[v]=[]; saveConfigLocal();
  document.getElementById('new-grupo').value='';
  renderAjustes(); renderGrupoBtns();
}

function renderSelGrupoEj() {
  const sel=document.getElementById('sel-grupo-ej'), cur=sel.value;
  sel.innerHTML=Object.keys(config.ejercicios).map(g=>`<option${g===cur?' selected':''}>${g}</option>`).join('');
}
function renderEjerciciosAdmin() {
  const g=document.getElementById('sel-grupo-ej').value, list=config.ejercicios[g]||[];
  document.getElementById('ejercicios-admin-chips').innerHTML = list.map(e=>
    `<span style="color:#94a3b8">${esc(e)}</span>
     <button class="chip-del" onclick='removeEjercicio(${JSON.stringify(g)},'${e.replace(/'/g,"\\'")}')'>×</button></span>`
  ).join('')||'<span style="color:#475569;font-size:12px">Sin ejercicios</span>';
}
function addEjercicio() {
  const g=document.getElementById('sel-grupo-ej').value, v=document.getElementById('new-ejercicio').value.trim();
  if(!v||!g||(config.ejercicios[g]||[]).includes(v)) return;
  config.ejercicios[g]=[...(config.ejercicios[g]||[]),v]; saveConfigLocal();
  document.getElementById('new-ejercicio').value=''; renderEjerciciosAdmin();
}
function removeEjercicio(g,e) {
  config.ejercicios[g]=config.ejercicios[g].filter(x=>x!==e); saveConfigLocal(); renderEjerciciosAdmin();
}

// ─── BOOT ───
initSupabase();
 
</script>
