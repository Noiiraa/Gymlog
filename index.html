<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Gyms Lab 💪</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --lavender-blush:#FFE9ED;
    --powder-blush:#F6B6B7;
    --muted-teal:#A6C9B6;
    --pacific-cyan:#3E828E;
    --dark-amethyst:#27153D;

    --bg:#120b1e;
    --text:#FFE9ED;
    --muted:#A6C9B6;
    --muted-2:rgba(255,233,237,.68);
    --surface:rgba(39,21,61,.62);
    --surface-strong:rgba(39,21,61,.82);
    --surface-soft:rgba(255,233,237,.10);
    --border:rgba(255,233,237,.18);
    --border-strong:rgba(246,182,183,.42);
    --accent:#F6B6B7;
    --accent-2:#3E828E;
    --success:#A6C9B6;
    --danger:#F6B6B7;
    --shadow:0 18px 42px rgba(12,5,24,.36);
    --radius:18px;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  html{
    min-height:100%;
    background:
      radial-gradient(circle at 16% 18%, rgba(166,201,182,.82) 0 9%, transparent 27%),
      radial-gradient(circle at 82% 10%, rgba(62,130,142,.72) 0 12%, transparent 31%),
      radial-gradient(circle at 50% 4%, rgba(246,182,183,.42) 0 10%, transparent 34%),
      radial-gradient(circle at 50% 92%, rgba(255,233,237,.58) 0 14%, transparent 38%),
      radial-gradient(circle at 88% 84%, rgba(246,182,183,.32) 0 11%, transparent 30%),
      linear-gradient(145deg,#090711 0%,#27153D 46%,#3E828E 100%);
    background-attachment:fixed;
  }

  body{
    color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    max-width:480px;
    margin:0 auto;
    padding-bottom:96px;
    min-height:100vh;
    position:relative;
    background:transparent;
  }

  body::before{
    content:"";
    position:fixed;
    inset:-30px;
    z-index:-2;
    pointer-events:none;
    background:
      radial-gradient(ellipse at 8% 25%, rgba(166,201,182,.62), transparent 30%),
      radial-gradient(ellipse at 76% 18%, rgba(39,21,61,.80), transparent 42%),
      radial-gradient(ellipse at 42% 68%, rgba(246,182,183,.34), transparent 34%),
      radial-gradient(ellipse at 90% 72%, rgba(255,233,237,.32), transparent 30%),
      radial-gradient(ellipse at 50% 105%, rgba(166,201,182,.44), transparent 36%);
    filter:blur(24px);
    transform:scale(1.04);
  }

  body::after{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    background:rgba(8,6,16,.28);
    backdrop-filter:blur(4px);
  }

  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  .header{
    margin:14px 12px 0;
    padding:16px;
    border:1px solid var(--border);
    border-radius:0 0 22px 22px;
    background:rgba(39,21,61,.48);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    gap:12px;
  }

  .logo{
    width:42px;
    height:42px;
    background:linear-gradient(135deg,var(--lavender-blush),var(--powder-blush));
    color:var(--dark-amethyst);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    flex-shrink:0;
    box-shadow:0 8px 22px rgba(246,182,183,.20);
  }

  .header-title{font-weight:800;font-size:19px;letter-spacing:-.6px;color:var(--lavender-blush);}
  .header-sub{font-size:11px;color:var(--muted-2);display:flex;align-items:center;gap:6px;}

  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted-teal);display:inline-block;box-shadow:0 0 12px rgba(166,201,182,.9);}
  .sync-dot.syncing{background:var(--powder-blush);animation:pulse 1s infinite;}
  .sync-dot.error{background:#ff8ca0;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .tabs{
    display:flex;
    gap:6px;
    padding:10px 12px;
    margin:10px 12px 4px;
    background:rgba(39,21,61,.36);
    backdrop-filter:blur(18px);
    position:sticky;
    top:0;
    z-index:10;
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:0 10px 28px rgba(12,5,24,.22);
  }

  .tab{
    flex:1;
    padding:9px 3px;
    border-radius:13px;
    border:1px solid transparent;
    font-size:11px;
    font-weight:750;
    background:rgba(255,233,237,.08);
    color:rgba(255,233,237,.70);
    transition:all .15s;
  }

  .tab.active{
    background:linear-gradient(135deg,var(--powder-blush),var(--lavender-blush));
    color:var(--dark-amethyst);
    border-color:rgba(255,233,237,.45);
    box-shadow:0 10px 22px rgba(246,182,183,.18);
  }

  .page{display:none;padding:16px;}
  .page.active{display:block;}

  .label{
    font-size:11px;
    color:var(--lavender-blush);
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:7px;
    display:block;
    opacity:.82;
  }

  .section{margin-bottom:18px;}

  .input{
    background:rgba(39,21,61,.66);
    border:1px solid var(--border);
    border-radius:13px;
    padding:12px 13px;
    color:var(--lavender-blush);
    font-size:14px;
    width:100%;
    outline:none;
    backdrop-filter:blur(12px);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }

  .input::placeholder{color:rgba(255,233,237,.42);}
  .input:focus{border-color:var(--powder-blush);box-shadow:0 0 0 3px rgba(246,182,183,.16);}
  select.input option{background:var(--dark-amethyst);color:var(--lavender-blush);}

  .btn-row{display:flex;gap:7px;flex-wrap:wrap;}

  .btn-pill,.persona-btn,.ej-btn{
    border:1px solid var(--border);
    background:rgba(39,21,61,.58);
    color:rgba(255,233,237,.72);
    backdrop-filter:blur(12px);
    box-shadow:0 8px 20px rgba(12,5,24,.16);
  }

  .btn-pill{
    padding:9px 14px;
    border-radius:999px;
    font-weight:750;
    font-size:13px;
    transition:all .15s;
  }

  .persona-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .persona-btn{
    flex:1;
    min-width:80px;
    padding:12px 8px;
    border-radius:16px;
    font-weight:800;
    font-size:14px;
    transition:all .15s;
  }

  .ejercicio-list{display:flex;flex-direction:column;gap:7px;}
  .ej-btn{
    padding:12px 14px;
    border-radius:15px;
    font-size:13px;
    text-align:left;
    transition:all .15s;
  }

  .btn-save,.btn-primary,.btn-add{
    border:none;
    background:linear-gradient(135deg,var(--powder-blush),var(--lavender-blush));
    color:var(--dark-amethyst);
    font-weight:850;
    box-shadow:0 14px 28px rgba(246,182,183,.24);
  }

  .btn-save{
    width:100%;
    padding:15px;
    border-radius:18px;
    font-size:16px;
    transition:all .2s;
    margin-top:4px;
  }

  .btn-save:disabled{
    background:rgba(39,21,61,.52);
    color:rgba(255,233,237,.30);
    box-shadow:none;
    cursor:not-allowed;
    border:1px solid var(--border);
  }
  .btn-save.ready{background:linear-gradient(135deg,var(--powder-blush),var(--lavender-blush));color:var(--dark-amethyst);}
  .btn-save.done{background:linear-gradient(135deg,var(--muted-teal),var(--lavender-blush));color:var(--dark-amethyst);}
  .btn-save.saving{background:linear-gradient(135deg,var(--pacific-cyan),var(--muted-teal));color:var(--dark-amethyst);}

  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  .entry-card,.card{
    background:var(--surface);
    border:1px solid var(--border);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }

  .entry-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 13px;
    border-radius:16px;
    margin-bottom:7px;
    border-left:4px solid var(--muted-teal);
  }

  .entry-title{font-size:13px;font-weight:800;color:var(--lavender-blush);}
  .entry-sub{font-size:11px;color:var(--muted-2);margin-top:2px;}
  .del-btn{background:none;border:none;color:rgba(255,233,237,.48);font-size:20px;padding:0 4px;line-height:1;}

  .card{
    border-radius:22px;
    padding:17px;
    margin-bottom:16px;
  }

  .card-title{
    font-size:11px;
    color:var(--lavender-blush);
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:13px;
    opacity:.88;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,233,237,.10);
    border:1px solid var(--border);
    border-radius:999px;
    padding:7px 11px;
    font-size:12px;
    margin:3px;
    color:var(--lavender-blush);
  }

  .chip-del{background:none;border:none;color:rgba(255,233,237,.48);cursor:pointer;font-size:14px;padding:0;line-height:1;}

  .add-row{display:flex;gap:8px;margin-top:9px;}
  .btn-add{padding:11px 14px;border-radius:14px;white-space:nowrap;font-size:13px;}

  .bar-row{margin-bottom:12px;}
  .bar-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;color:var(--lavender-blush);}
  .bar-track{height:9px;background:rgba(255,233,237,.12);border-radius:999px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;transition:width .5s;}

  .chart-wrap{
    position:relative;
    background:rgba(9,7,17,.38);
    border:1px solid var(--border);
    border-radius:18px;
    padding:13px 8px 8px;
    margin-bottom:9px;
  }

  .chart-stat{text-align:center;margin-top:10px;font-size:13px;font-weight:800;}
  .empty-msg,.no-data,.loading{
    background:rgba(39,21,61,.45);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px 20px;
    text-align:center;
    color:var(--muted-2);
    font-size:13px;
  }

  .export-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    padding:11px;
    border-radius:15px;
    border:1px solid var(--border);
    background:rgba(255,233,237,.08);
    color:var(--lavender-blush);
    font-size:13px;
    font-weight:750;
    margin-top:8px;
    backdrop-filter:blur(12px);
  }

  .export-btn:hover{border-color:var(--powder-blush);color:var(--powder-blush);}
  .danger-btn{width:100%;padding:12px;border-radius:15px;border:1px solid rgba(246,182,183,.42);background:transparent;color:var(--powder-blush);font-weight:700;font-size:13px;}

  .session-entries{margin-top:16px;}
  .session-title{font-size:11px;color:var(--lavender-blush);font-weight:850;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;opacity:.8;}

  .toast{
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(39,21,61,.86);
    border:1px solid var(--border-strong);
    color:var(--lavender-blush);
    padding:11px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:750;
    z-index:100;
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
    backdrop-filter:blur(16px);
    box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;}

  .history-summary{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:16px;
    background:rgba(39,21,61,.42);
    color:var(--muted-2);
    font-size:12px;
    backdrop-filter:blur(14px);
  }

  .history-pager{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:14px 0 2px;
  }

  .pager-btn{
    min-width:42px;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid var(--border);
    background:rgba(255,233,237,.10);
    color:var(--lavender-blush);
    font-weight:850;
    backdrop-filter:blur(12px);
  }

  .pager-btn:disabled{
    opacity:.35;
    cursor:not-allowed;
  }

  .pager-text{
    min-width:96px;
    text-align:center;
    color:var(--muted-2);
    font-size:12px;
    font-weight:750;
  }

  .config-screen{
    position:fixed;
    inset:0;
    z-index:200;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 24px;
    gap:16px;
    background:
      radial-gradient(circle at 18% 22%, rgba(166,201,182,.62) 0 10%, transparent 32%),
      radial-gradient(circle at 80% 16%, rgba(62,130,142,.62) 0 12%, transparent 34%),
      radial-gradient(circle at 50% 80%, rgba(246,182,183,.38) 0 14%, transparent 42%),
      linear-gradient(145deg,#090711 0%,#27153D 52%,#3E828E 100%);
  }

  .config-screen::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(8,6,16,.24);
    backdrop-filter:blur(14px);
  }

  .config-screen > *{position:relative;z-index:1;}

  .config-screen h2{
    font-size:23px;
    font-weight:900;
    color:var(--lavender-blush);
    text-shadow:0 1px 22px rgba(246,182,183,.24);
  }

  .config-screen p{color:var(--muted-2);font-size:13px;text-align:center;line-height:1.6;}
  .config-screen .input{margin-bottom:0;background:rgba(255,233,237,.12);}
  .config-label{font-size:12px;color:var(--lavender-blush);font-weight:750;margin-bottom:5px;}
  .config-group{width:100%;max-width:360px;}
  .btn-primary{width:100%;max-width:360px;padding:15px;border-radius:18px;font-size:16px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="config-screen" id="login-screen" style="display:none">
  <div style="font-size:40px">🔐</div>
  <h2>Entrar en Gyms Lab</h2>
  <p>Inicia sesión con tu usuario autorizado.</p>

  <div class="config-group">
    <div class="config-label">Email</div>
    <input class="input" id="login-email" type="email" placeholder="tu@email.com" autocomplete="email"/>
  </div>

  <div class="config-group">
    <div class="config-label">Contraseña</div>
    <input class="input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn-primary" onclick="login()">Entrar →</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="header">
    <div class="logo">💪</div>
    <div>
      <div class="header-title">Gyms Lab</div>
      <div class="header-sub">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="header-stats">Cargando...</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('registro')">➕ Anotar</button>
    <button class="tab" onclick="showTab('historial')">📋 Historial</button>
    <button class="tab" onclick="showTab('progreso')">📈 Progreso</button>
    <button class="tab" onclick="showTab('ajustes')">⚙️ Ajustes</button>
  </div>

  <!-- REGISTRO -->
  <div id="page-registro" class="page active">
    <div class="section">
      <label class="label">Fecha</label>
      <input type="date" id="reg-fecha" class="input"/>
    </div>
    <div class="section">
      <label class="label">Persona</label>
      <div class="persona-btns" id="persona-btns"></div>
    </div>
    <div class="section">
      <label class="label">Grupo muscular</label>
      <div class="btn-row" id="grupo-btns"></div>
    </div>
    <div class="section" id="ejercicio-section" style="display:none">
      <label class="label">Ejercicio</label>
      <div class="ejercicio-list" id="ejercicio-list"></div>
    </div>
    <div class="grid3 section">
      <div>
        <label class="label">Series</label>
        <select id="reg-series" class="input">
          <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option>
        </select>
      </div>
      <div>
        <label class="label">Reps</label>
        <select id="reg-reps" class="input">
          <option>5</option><option>6</option><option>7</option><option selected>8</option><option>9</option><option>10</option><option>12</option><option>15</option><option>20</option>
        </select>
      </div>
      <div>
        <label class="label">Peso (kg)</label>
        <input type="number" id="reg-peso" class="input" placeholder="0" step="0.5"/>
      </div>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveEntry()" disabled>Guardar serie</button>
    <div class="session-entries" id="session-entries" style="display:none">
      <div class="session-title" id="session-count"></div>
      <div id="session-list"></div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="page-historial" class="page">
    <div id="historial-list"><div class="loading">Cargando...</div></div>
  </div>

  <!-- PROGRESO -->
  <div id="page-progreso" class="page">
    <div class="card">
      <div class="card-title">Volumen por grupo muscular</div>
      <div id="volumen-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">Evolución de peso</div>
      <div class="btn-row" id="chart-persona-btns" style="margin-bottom:10px;"></div>
      <select id="chart-ejercicio" class="input" style="margin-bottom:12px;" onchange="renderChart()"></select>
      <div id="chart-container">
        <div class="chart-wrap"><canvas id="myChart" height="200"></canvas></div>
        <div class="chart-stat" id="chart-stat"></div>
        <button class="export-btn" onclick="exportChart()">📷 Guardar gráfico como imagen</button>
      </div>
      <div id="chart-empty" class="empty-msg" style="display:none">Necesitas al menos 2 sesiones con este ejercicio</div>
    </div>
  </div>

  <!-- AJUSTES -->
  <div id="page-ajustes" class="page">
    <div class="card">
      <div class="card-title">👤 Personas</div>
      <div id="personas-chips"></div>
      <div class="add-row">
        <input id="new-persona" class="input" placeholder="Nombre nuevo..." onkeydown="if(event.key==='Enter')addPersona()"/>
        <button class="btn-add" onclick="addPersona()">+ Añadir</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🏋️ Grupos musculares</div>
      <div id="grupos-chips"></div>
      <div class="add-row">
        <input id="new-grupo" class="input" placeholder="Nuevo grupo..." onkeydown="if(event.key==='Enter')addGrupo()"/>
        <button class="btn-add" onclick="addGrupo()">+ Añadir</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🔧 Ejercicios por grupo</div>
      <select id="sel-grupo-ej" class="input" style="margin-bottom:10px;" onchange="renderEjerciciosAdmin()"></select>
      <div id="ejercicios-admin-chips"></div>
      <div class="add-row">
        <input id="new-ejercicio" class="input" placeholder="Nombre del ejercicio..." onkeydown="if(event.key==='Enter')addEjercicio()"/>
        <button class="btn-add" onclick="addEjercicio()">+ Añadir</button>
      </div>
    </div>
     <div class="card">
       <div class="card-title">🔌 Conexión</div>
       <div style="font-size:12px;color:#64748b;margin-bottom:10px;" id="conn-info"></div>
       <button class="export-btn" onclick="logout()" style="margin-bottom:8px;">🚪 Cerrar sesión</button>
     </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ─── CREDENTIALS ───
async function initSupabase() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginScreen = document.getElementById('login-screen');
    const app = document.getElementById('app');

    if (loginScreen) loginScreen.style.display = 'none';
    if (app) app.style.display = 'none';

    const { data, error } = await sbClient.auth.getSession();
    if (error) throw error;

    if (data.session) {
      await startApp();
    } else {
      loginScreen.style.display = 'flex';
    }

    sbClient.auth.onAuthStateChange((_event, session) => {
      if (session) {
        startApp();
      } else {
        sessions = [];
        sessionEntries = [];
        app.style.display = 'none';
        loginScreen.style.display = 'flex';
      }
    });

  } catch(e) {
    alert('Error inicializando Supabase: ' + e.message);
    console.error(e);
  }
}

async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  loadConfig();
  await loadSessions();

  const { data } = await sbClient.auth.getUser();
  const email = data?.user?.email || 'usuario';

  const conn = document.getElementById('conn-info');
  if (conn) conn.textContent = `Sesión iniciada como: ${email}`;
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    alert('Introduce email y contraseña');
    return;
  }

  try {
    const { error } = await sbClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) throw error;

    document.getElementById('login-password').value = '';
    showToast('Sesión iniciada');
  } catch (e) {
    alert('No se pudo iniciar sesión: ' + e.message);
    console.error(e);
  }
}

async function logout() {
  try {
    const { error } = await sbClient.auth.signOut();
    if (error) throw error;

    sessions = [];
    sessionEntries = [];
    showToast('Sesión cerrada');
  } catch (e) {
    alert('Error cerrando sesión: ' + e.message);
    console.error(e);
  }
}

// ─── CONFIG (localStorage) ───
function loadConfig() {
  try { const r = localStorage.getItem(CONFIG_KEY); config = r ? JSON.parse(r) : null; } catch {}
  if (!config) { config = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); saveConfigLocal(); }
  chartPersona = config.personas[0] || "María";
  initRegistro();
  document.getElementById('reg-peso').addEventListener('input', updateSaveBtn);
}
function saveConfigLocal() { localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); }

// ─── SUPABASE SESSIONS ───
function setSyncing(state) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
}

async function loadSessions() {
  setSyncing('syncing');
  try {
    const { data, error } = await sbClient.from('sesiones').select('*').order('fecha', {ascending:true}).order('id', {ascending:true});
    if (error) throw error;
    sessions = data || [];
    // Import historical if DB is empty
    // Import histórico desactivado en producción.
    // Si necesitas importar datos antiguos, hazlo una sola vez desde Supabase SQL o desde un script controlado.
    setSyncing('ok');
    updateHeaderStats();
  } catch(e) {
    setSyncing('error'); showToast('Error cargando datos'); console.error(e);
  }
}

async function importHistorical() {
  setSyncing('syncing');
  try {
    const rows = HISTORICAL.map(h => ({fecha:h.fecha, persona:h.persona, grupo:h.grupo, ejercicio:h.ejercicio, series:h.series, reps:h.reps, peso:h.peso}));
    const { error } = await sbClient.from('sesiones').insert(rows);
    if (error) throw error;
    showToast('✅ Datos históricos importados');
    await loadSessions();
  } catch(e) {
    setSyncing('error'); showToast('Error importando histórico'); console.error(e);
  }
}

async function insertEntry(entry) {
  const { data, error } = await sbClient.from('sesiones').insert([{
    fecha: entry.fecha, persona: entry.persona, grupo: entry.grupo,
    ejercicio: entry.ejercicio, series: entry.series, reps: entry.reps, peso: entry.peso
  }]).select().single();
  if (error) throw error;
  return data;
}

async function deleteEntryDB(id) {
  const { error } = await sbClient.from('sesiones').delete().eq('id', id);
  if (error) throw error;
}

function personaColor(p) {
  const i = config.personas.indexOf(p);
  return i >= 0 ? PERSONA_COLORS[i % PERSONA_COLORS.length] : "#94a3b8";
}
function groupColor(g) { return GROUP_COLORS[g] || "#94a3b8"; }

function showToast(msg, duration=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updateHeaderStats() {
  const days = new Set(sessions.map(s => s.fecha)).size;
  document.getElementById('header-stats').textContent = `${days} sesiones · ${sessions.length} entradas`;
}

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

// ─── TABS ───
function showTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['registro','historial','progreso','ajustes'][i] === t);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if (t==='historial') renderHistorial();
  if (t==='progreso') renderProgreso();
  if (t==='ajustes') renderAjustes();
}

async function saveEntry() {
  const peso = parseFloat(document.getElementById('reg-peso').value);
  if (!selectedPersona||!selectedEjercicio||!peso) return;
  const entry = {
    fecha: document.getElementById('reg-fecha').value,
    persona: selectedPersona, grupo: selectedGrupo||'Otros',
    ejercicio: selectedEjercicio,
    series: parseInt(document.getElementById('reg-series').value),
    reps: parseInt(document.getElementById('reg-reps').value),
    peso
  };
  const btn = document.getElementById('btn-save');
  btn.textContent='Guardando...'; btn.className='btn-save saving'; btn.disabled=true;
  try {
    const saved = await insertEntry(entry);
    sessions.push(saved);
    sessionEntries.push(saved);
    document.getElementById('reg-peso').value='';
    updateHeaderStats();
    renderSessionEntries();
    btn.textContent='✓ Guardado'; btn.className='btn-save done';
    setTimeout(()=>{ btn.textContent='Guardar serie'; updateSaveBtn(); },1400);
  } catch(e) {
    btn.textContent='Error — reintentar'; btn.className='btn-save ready'; btn.disabled=false;
    showToast('Error guardando. Comprueba la conexión.'); console.error(e);
  }
}

// ─── HISTORIAL ───
function renderHistorial() {
  const el = document.getElementById('historial-list');
  const list = [...sessions].sort((a,b) => {
    const byDate = String(b.fecha || '').localeCompare(String(a.fecha || ''));
    if (byDate !== 0) return byDate;
    return Number(b.id || 0) - Number(a.id || 0);
  });

  if (!list.length) {
    el.innerHTML = '<div class="no-data">Sin entradas todavía</div>';
    return;
  }

  const totalPages = Math.max(1, Math.ceil(list.length / HISTORIAL_PAGE_SIZE));
  historialPage = Math.min(Math.max(historialPage, 1), totalPages);

  const start = (historialPage - 1) * HISTORIAL_PAGE_SIZE;
  const end = start + HISTORIAL_PAGE_SIZE;
  const pageItems = list.slice(start, end);

  const summary = `<div class="history-summary">
    <span>${esc(list.length)} entradas</span>
    <span>Mostrando ${esc(start + 1)}-${esc(Math.min(end, list.length))}</span>
  </div>`;

  const cards = pageItems.map(s => {
    const pc = personaColor(s.persona);
    return `<div class="entry-card" style="border-left-color:${groupColor(s.grupo)}">
      <div>
        <div class="entry-title">${esc(s.ejercicio || '—')}</div>
        <div class="entry-sub">${esc(s.fecha)} · <span style="color:${pc}">${esc(s.persona)}</span> · ${esc(s.series)}×${esc(s.reps)} · ${esc(s.peso)}kg</div>
      </div>
      <button class="del-btn" onclick="deleteEntry(${Number(s.id)})">×</button>
    </div>`;
  }).join('');

  const pager = totalPages > 1 ? `<div class="history-pager">
    <button class="pager-btn" onclick="setHistorialPage(${historialPage - 1})" ${historialPage <= 1 ? 'disabled' : ''}>‹</button>
    <div class="pager-text">Página ${esc(historialPage)} / ${esc(totalPages)}</div>
    <button class="pager-btn" onclick="setHistorialPage(${historialPage + 1})" ${historialPage >= totalPages ? 'disabled' : ''}>›</button>
  </div>` : '';

  el.innerHTML = summary + cards + pager;
}

function setHistorialPage(page) {
  historialPage = page;
  renderHistorial();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteEntry(id) {
  if (!confirm('¿Borrar esta entrada?')) return;
  try {
    await deleteEntryDB(id);
    sessions = sessions.filter(s=>s.id!==id);
    updateHeaderStats(); renderHistorial();
  } catch(e) { showToast('Error borrando'); }
}

function renderVolumen() {
  const map={};
  sessions.forEach(s=>{ if(s.grupo) map[s.grupo]=(map[s.grupo]||0)+1; });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  document.getElementById('volumen-bars').innerHTML = sorted.map(([g,c])=>
    `<div class="bar-row">
      <div class="bar-labels"><span>${esc(g)}</span><span style="color:#64748b">${esc(c)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c/max)*100}%;background:${groupColor(g)}"></div></div>
    </div>`).join('');
}

function renderChartPersonaBtns() {
  document.getElementById('chart-persona-btns').innerHTML = config.personas.map(p => {
    const c=personaColor(p), sel=chartPersona===p;
    return `<button class="btn-pill" onclick='selectChartPersona(${JSON.stringify(p)})'
      style="border-color:${sel?c:'rgba(255,233,237,.18)'};background:${sel?c+'22':'rgba(39,21,61,.58)'};color:${sel?c:'rgba(255,233,237,.62)'};font-weight:${sel?700:400}">${esc(p)}</button>`;
  }).join('');
}

function selectChartPersona(p) { chartPersona=p; renderChartPersonaBtns(); renderChart(); }

function renderChartEjercicioSelect() {
  const all=[...new Set(sessions.map(s=>s.ejercicio).filter(Boolean))].sort();
  const sel=document.getElementById('chart-ejercicio'), cur=sel.value;
  sel.innerHTML = all.map(e =>
   `<option value="${esc(e)}"${e===cur?' selected':''}>${esc(e)}</option>`
 ).join('');
}

function renderChart() {
  const ejercicio=document.getElementById('chart-ejercicio').value;
  const data=sessions
    .filter(s=>s.persona===chartPersona&&s.ejercicio===ejercicio)
    .reduce((acc,s)=>{
      const ex=acc.find(a=>a.fecha===s.fecha);
      if(ex) ex.peso=Math.max(ex.peso,s.peso); else acc.push({fecha:s.fecha,peso:s.peso});
      return acc;
    },[]).sort((a,b)=>a.fecha.localeCompare(b.fecha));

  const cont=document.getElementById('chart-container'), emp=document.getElementById('chart-empty');
  if(data.length<2){ cont.style.display='none'; emp.style.display='block'; return; }
  cont.style.display='block'; emp.style.display='none';

  const color=personaColor(chartPersona);
  if(myChart) myChart.destroy();
  myChart=new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'line',
    data:{labels:data.map(d=>d.fecha.slice(5)),datasets:[{
      label:ejercicio, data:data.map(d=>d.peso),
      borderColor:color, backgroundColor:color+'22',
      pointBackgroundColor:color, pointRadius:5, pointHoverRadius:7,
      borderWidth:2.5, fill:true, tension:0.3
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#27153D',borderColor:'#F6B6B7',borderWidth:1,callbacks:{label:c=>`${c.parsed.y} kg`}}},
      scales:{
        x:{ticks:{color:'#FFE9ED',font:{size:10}},grid:{color:'rgba(255,233,237,.12)'}},
        y:{ticks:{color:'#FFE9ED',font:{size:10},callback:v=>v+'kg'},grid:{color:'rgba(255,233,237,.12)'}}
      }
    }
  });

  const diff=data.at(-1).peso-data[0].peso, pct=((diff/data[0].peso)*100).toFixed(1);
  const statEl=document.getElementById('chart-stat');
  statEl.style.color=diff>=0?'#A6C9B6':'#F6B6B7';
  statEl.textContent=`${diff>=0?'↑':'↓'} ${Math.abs(diff).toFixed(1)} kg (${diff>=0?'+':''}${pct}%) desde inicio`;
}

function exportChart() {
  if(!myChart) return;
  const ejercicio=document.getElementById('chart-ejercicio').value;
  const a=document.createElement('a');
  a.download=`gymlog_${chartPersona}_${ejercicio.replace(/\s+/g,'_')}.png`;
  a.href=myChart.toBase64Image('image/png',1); a.click();
}

// ─── AJUSTES ───
function renderAjustes() {
  renderPersonasChips(); renderGruposChips(); renderSelGrupoEj(); renderEjerciciosAdmin();
}

function renderPersonasChips() {
  document.getElementById('personas-chips').innerHTML = config.personas.map(p=>{
    const c=personaColor(p);
    return `<span class="chip" style="border:1px solid ${c}44">
      <span style="color:${c};font-weight:700">${esc(p)}</span>
      <button class="chip-del" onclick='removePersona(${JSON.stringify(p)})'>×</button></span>`;
  }).join('');
}
function addPersona() {
  const v=document.getElementById('new-persona').value.trim();
  if(!v||config.personas.includes(v)) return;
  config.personas.push(v); saveConfigLocal();
  document.getElementById('new-persona').value='';
  renderAjustes(); renderPersonaBtns();
}
function removePersona(p) {
  if(config.personas.length<=1) return;
  config.personas=config.personas.filter(x=>x!==p); saveConfigLocal();
  renderAjustes(); renderPersonaBtns();
}

function renderGruposChips() {
  document.getElementById('grupos-chips').innerHTML = Object.keys(config.ejercicios).map(g=>
    `<span class="chip" style="background:${groupColor(g)}22;color:${groupColor(g)}">${esc(g)}</span>`
  ).join('');
}
function addGrupo() {
  const v=document.getElementById('new-grupo').value.trim();
  if(!v||config.ejercicios[v]) return;
  config.ejercicios[v]=[]; saveConfigLocal();
  document.getElementById('new-grupo').value='';
  renderAjustes(); renderGrupoBtns();
}

function renderSelGrupoEj() {
  const sel=document.getElementById('sel-grupo-ej'), cur=sel.value;
  sel.innerHTML=Object.keys(config.ejercicios).map(g=>`<option value="${esc(g)}"${g===cur?' selected':''}>${esc(g)}</option>`).join('');
}
function renderEjerciciosAdmin() {
  const g=document.getElementById('sel-grupo-ej').value, list=config.ejercicios[g]||[];
  document.getElementById('ejercicios-admin-chips').innerHTML = list.map(e=>
    `<span class="chip"><span style="color:rgba(255,233,237,.72)">${esc(e)}</span>
     <button class="chip-del" onclick='removeEjercicio(${JSON.stringify(g)}, ${JSON.stringify(e)})'>×</button></span>`
  ).join('')||'<span style="color:rgba(255,233,237,.45);font-size:12px">Sin ejercicios</span>';
}
function addEjercicio() {
  const g=document.getElementById('sel-grupo-ej').value, v=document.getElementById('new-ejercicio').value.trim();
  if(!v||!g||(config.ejercicios[g]||[]).includes(v)) return;
  config.ejercicios[g]=[...(config.ejercicios[g]||[]),v]; saveConfigLocal();
  document.getElementById('new-ejercicio').value=''; renderEjerciciosAdmin();
}
function removeEjercicio(g,e) {
  config.ejercicios[g]=config.ejercicios[g].filter(x=>x!==e); saveConfigLocal(); renderEjerciciosAdmin();
}

// ─── BOOT ───
initSupabase();
 
</script>
</body>
</html>
